name: lyricflow
description: A lightweight local music player prototype focused on fullscreen TV-style playback.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  audio_metadata_reader: ^1.6.0
  flutter:
    sdk: flutter
  flutter_sdl_gamepad: ^1.1.3
  http: ^1.6.0
  just_audio: ^0.10.5
  just_audio_media_kit: ^2.1.0
  media_kit_libs_linux: ^1.2.1
  sdl3: ^0.1.45
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
